<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login  Bugema University Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--gradient); padding:20px; }

    .login-wrap { width:100%; max-width:460px; }

    .login-header { text-align:center; margin-bottom:28px; }
    .login-header img { width:90px; height:90px; object-fit:contain; border-radius:50%; border:4px solid var(--gold); background:white; padding:8px; box-shadow:0 8px 32px rgba(0,0,0,0.3); animation:float 3s ease-in-out infinite; margin-bottom:16px; }
    .login-header h1 { color:white; font-size:1.6em; border:none; margin:0 0 6px; }
    .login-header p { color:rgba(255,255,255,0.75); font-size:0.88em; margin:0; }

    .login-box { background:white; border-radius:var(--radius); padding:36px; box-shadow:0 20px 60px rgba(0,0,0,0.25); }

    /* Role Tabs */
    .role-tabs { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:28px; }
    .role-tab {
      padding:12px 8px; border:2px solid var(--border); border-radius:var(--radius-sm);
      text-align:center; cursor:pointer; transition:var(--transition);
      background:var(--bg); font-size:0.82em; font-weight:600; color:var(--text-light);
    }
    .role-tab:hover { border-color:var(--navy); color:var(--navy); }
    .role-tab.active { background:var(--navy); color:white; border-color:var(--navy); }
    .role-tab .tab-icon { font-size:1.6em; display:block; margin-bottom:4px; }

    .form-row { margin-bottom:18px; }
    #login-error { display:none; padding:12px 16px; background:rgba(245,87,108,0.08); border-left:4px solid #f5576c; border-radius:var(--radius-sm); color:#c0392b; font-size:0.88em; margin-bottom:16px; }

    .login-footer { text-align:center; margin-top:20px; font-size:0.85em; color:var(--text-light); }
    .login-footer a { color:var(--navy); font-weight:600; }

    .password-wrap { position:relative; }
    .password-wrap input { padding-right:44px; }
    .toggle-pw { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.1em; color:var(--text-light); }

    .hint-box { background:var(--gold-pale); border:1px solid rgba(200,150,12,0.3); border-radius:var(--radius-sm); padding:10px 14px; font-size:0.8em; color:#8B6508; margin-bottom:16px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <img src="badge.png" alt="Bugema University Logo">
      <h1>Bugema University</h1>
      <p>Department of Computing and Informatics  Portal Login</p>
    </div>

    <div class="login-box">
      <!-- Role Selector -->
      <div class="role-tabs" role="tablist" aria-label="Select login role">
        <div class="role-tab active" data-role="student" role="tab" aria-selected="true" tabindex="0" onclick="setRole('student')">
          <span class="tab-icon"></span>Student
        </div>
        <div class="role-tab" data-role="staff" role="tab" aria-selected="false" tabindex="0" onclick="setRole('staff')">
          <span class="tab-icon"></span>Staff
        </div>
        <div class="role-tab" data-role="admin" role="tab" aria-selected="false" tabindex="0" onclick="setRole('admin')">
          <span class="tab-icon"></span>Admin
        </div>
      </div>

      <div id="login-error" role="alert"></div>

      <!-- Demo credentials hint -->
      <div class="hint-box" id="demo-hint">
         <strong>Demo:</strong> Reg No: <code>BU/2026/0001</code> &nbsp;|&nbsp; Password: <code>password</code>
      </div>

      <form id="login-form" novalidate>
        <input type="hidden" name="role" id="role-input" value="student">

        <div class="form-row">
          <label for="username" id="username-label">Registration Number / Email</label>
          <input type="text" id="username" name="username" placeholder="e.g. BU/2026/0001" required autocomplete="username">
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Toggle password visibility"></button>
          </div>
        </div>

        <input type="submit" value="Sign In " style="width:100%;">
      </form>

      <div class="login-footer">
        <p>Don't have an account? <a href="task6-registration-form.html">Register here</a></p>
        <p style="margin-top:8px;"><a href="task7-home.html"> Back to Website</a></p>
      </div>
    </div>
  </div>

  <script>
    const hints = {
      student: ' <strong>Student Demo:</strong> Reg No: <code>BU/2026/0001</code> &nbsp;|&nbsp; Password: <code>password</code>',
      staff:   ' <strong>Staff Demo:</strong> Staff ID: <code>STAFF001</code> &nbsp;|&nbsp; Password: <code>Staff@2026</code>',
      admin:   ' <strong>Admin Demo:</strong> Username: <code>admin</code> &nbsp;|&nbsp; Password: <code>password</code>'
    };
    const labels = {
      student: 'Registration Number / Email',
      staff:   'Staff ID / Email',
      admin:   'Admin Username'
    };
    const placeholders = {
      student: 'e.g. BU/2026/0001',
      staff:   'e.g. STAFF001',
      admin:   'admin'
    };

    function setRole(role) {
      document.querySelectorAll('.role-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.role === role);
        t.setAttribute('aria-selected', t.dataset.role === role);
      });
      document.getElementById('role-input').value = role;
      document.getElementById('username-label').textContent = labels[role];
      document.getElementById('username').placeholder = placeholders[role];
      document.getElementById('demo-hint').innerHTML = hints[role];
      document.getElementById('login-error').style.display = 'none';
    }

    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      const btn = this.querySelector('input[type="submit"]');
      btn.value = 'Signing in'; btn.disabled = true;

      // Client-side validation
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        err.textContent = 'Please fill in all fields.';
        err.style.display = 'block';
        btn.value = 'Sign In '; btn.disabled = false;
        return;
      }

      const data = new FormData(this);
      try {
        const res = await fetch('api/login.php', { method: 'POST', body: data });
        const json = await res.json();
        if (json.success) {
          btn.value = ' Redirecting';
          window.location.href = json.redirect;
        } else {
          err.textContent = json.error || 'Login failed. Please try again.';
          err.style.display = 'block';
          btn.value = 'Sign In '; btn.disabled = false;
        }
      } catch {
        err.textContent = 'Server error. Make sure WAMP is running.';
        err.style.display = 'block';
        btn.value = 'Sign In '; btn.disabled = false;
      }
    });

    // Keyboard support for tabs
    document.querySelectorAll('.role-tab').forEach(tab => {
      tab.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') setRole(tab.dataset.role);
      });
    });
  </script>
</body>
</html>
